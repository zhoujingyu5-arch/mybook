<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机票价格监测中心 - 完整版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle { color: #666; font-size: 1rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #555;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .flight-list { max-height: 500px; overflow-y: auto; }
        .flight-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .flight-item.best {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            border: 2px solid #28a745;
        }
        .flight-airline { font-weight: 600; }
        .price-value { font-size: 1.5rem; font-weight: 700; color: #e74c3c; }
        .price-tag {
            font-size: 0.75rem;
            color: #28a745;
            background: rgba(40, 167, 69, 0.1);
            padding: 2px 8px;
            border-radius: 12px;
        }
        .price-tag.mock {
            background: rgba(255, 193, 7, 0.2);
            color: #856404;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 8px;
        }
        .tab {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.95rem;
            color: #666;
            border-radius: 8px;
        }
        .tab.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.show { display: block; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .chart-container { position: relative; height: 300px; }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ 机票价格监测中心</h1>
            <div class="subtitle">实时数据 · 智能比价 · 价格提醒</div>
        </header>
        
        <div class="grid">
            <div class="card">
                <div class="card-title">🔍 机票查询</div>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('single')">单程</button>
                    <button class="tab" onclick="switchTab('round')">往返</button>
                    <button class="tab" onclick="switchTab('multi')">多日期比价</button>
                </div>
                
                <div id="tab-single" class="tab-content active">
                    <div class="form-row">
                        <div class="form-group">
                            <label>出发城市</label>
                            <select id="fromCity"><option value="">选择城市</option></select>
                        </div>
                        <div class="form-group">
                            <label>到达城市</label>
                            <select id="toCity"><option value="">选择城市</option></select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>出发日期</label>
                        <input type="date" id="depDate">
                    </div>
                    
                    <button class="btn btn-primary" onclick="searchFlights()" style="width: 100%;">🚀 立即查询</button>
                </div>
                
                <div id="tab-round" class="tab-content">
                    <div class="form-row">
                        <div class="form-group">
                            <label>出发城市</label>
                            <select id="roundFrom"><option value="">选择</option></select>
                        </div>
                        <div class="form-group">
                            <label>到达城市</label>
                            <select id="roundTo"><option value="">选择</option></select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>去程日期</label>
                            <input type="date" id="roundGo">
                        </div>
                        <div class="form-group">
                            <label>返程日期</label>
                            <input type="date" id="roundBack">
                        </div>
                    </div>
                    
                    <button class="btn btn-primary" onclick="searchRoundTrip()" style="width: 100%;">🔄 查询往返</button>
                </div>
                
                <div id="tab-multi" class="tab-content">
                    <div class="form-row">
                        <div class="form-group">
                            <label>出发城市</label>
                            <select id="multiFrom"><option value="">选择</option></select>
                        </div>
                        <div class="form-group">
                            <label>到达城市</label>
                            <select id="multiTo"><option value="">选择</option></select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>开始日期</label>
                        <input type="date" id="multiStart">
                    </div>
                    
                    <div class="form-group">
                        <label>查询天数</label>
                        <select id="multiDays">
                            <option value="3">3天</option>
                            <option value="7" selected>7天</option>
                            <option value="14">14天</option>
                        </select>
                    </div>
                    
                    <button class="btn btn-primary" onclick="searchMultiDates()" style="width: 100%;">📅 多日期比价</button>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">🔔 价格监测</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>出发城市</label>
                        <select id="watchFrom"><option value="">选择</option></select>
                    </div>
                    <div class="form-group">
                        <label>到达城市</label>
                        <select id="watchTo"><option value="">选择</option></select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="watchDate">
                </div>
                
                <div class="form-group">
                    <label>提醒阈值 (元)</label>
                    <input type="number" id="watchThreshold" placeholder="如：1500">
                </div>
                
                <button class="btn btn-primary" onclick="addWatch()" style="width: 100%;">➕ 添加监测</button>
            </div>
        </div>
        
        <div class="grid">
            <div class="card">
                <div class="card-title">📊 查询结果</div>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <div>正在查询中...</div>
                </div>
                
                <div id="flightResults">
                    <div class="empty-state">请输入查询条件开始搜索</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">📈 价格走势</div>
                <div class="chart-container">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cities = ['北京', '上海', '广州', '深圳', '成都', '杭州', '武汉', '西安', '重庆', '青岛', '大连', '厦门', '昆明', '天津', '南京', '长沙', '大阪', '东京', '首尔', '新加坡', '曼谷', '香港', '台北', '伦敦', '巴黎', '纽约', '洛杉矶', '悉尼'];
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            populateCities();
            initDates();
        });
        
        function populateCities() {
            ['fromCity', 'toCity', 'roundFrom', 'roundTo', 'multiFrom', 'multiTo', 'watchFrom', 'watchTo'].forEach(id => {
                const select = document.getElementById(id);
                cities.forEach(city => {
                    select.innerHTML += `<option value="${city}">${city}</option>`;
                });
            });
        }
        
        function initDates() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const dateStr = tomorrow.toISOString().split('T')[0];
            
            ['depDate', 'roundGo', 'multiStart', 'watchDate'].forEach(id => {
                document.getElementById(id).value = dateStr;
            });
            
            const dayAfter = new Date();
            dayAfter.setDate(dayAfter.getDate() + 3);
            document.getElementById('roundBack').value = dayAfter.toISOString().split('T')[0];
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }
        
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }
        
        // 生成模拟航班数据（带真实价格算法）
        function generateFlights(from, to, date) {
            const airlines = [
                {name: '中国国际航空', code: 'CA'},
                {name: '中国东方航空', code: 'MU'},
                {name: '中国南方航空', code: 'CZ'},
                {name: '海南航空', code: 'HU'},
                {name: '春秋航空', code: '9C'},
                {name: '吉祥航空', code: 'HO'},
                {name: '厦门航空', code: 'MF'},
                {name: '深圳航空', code: 'ZH'}
            ];
            
            const flights = [];
            const basePrice = getBasePrice(from, to);
            
            for (let i = 0; i < 8; i++) {
                const airline = airlines[i];
                const variation = (i - 4) * 80;
                const randomFactor = Math.floor(Math.random() * 200) - 100;
                const price = Math.max(basePrice + variation + randomFactor, 400);
                
                const depHour = 7 + i * 2;
                const depMin = Math.floor(Math.random() * 60);
                const duration = 2 + Math.floor(Math.random() * 4);
                
                flights.push({
                    airline: airline.name,
                    flight_no: airline.code + (100 + i * 11),
                    dep_airport: from + ['首都', '大兴', '虹桥', '浦东'][i % 4] + '机场',
                    arr_airport: to + '机场',
                    dep_time_short: `${depHour.toString().padStart(2,'0')}:${depMin.toString().padStart(2,'0')}`,
                    arr_time_short: `${((depHour + duration) % 24).toString().padStart(2,'0')}:${((depMin + 30) % 60).toString().padStart(2,'0')}`,
                    price: price,
                    flight_time: `${duration}小时${Math.floor(Math.random() * 60)}分`,
                    is_mock: true
                });
            }
            
            return flights.sort((a, b) => a.price - b.price);
        }
        
        function getBasePrice(from, to) {
            const domestic = ['北京', '上海', '广州', '深圳', '成都', '杭州', '武汉', '西安', '重庆'];
            const intlShort = ['大阪', '东京', '首尔', '新加坡', '曼谷', '香港', '台北'];
            
            const fromDomestic = domestic.includes(from);
            const toDomestic = domestic.includes(to);
            const toShort = intlShort.includes(to);
            
            if (fromDomestic && toDomestic) return 600;
            if (fromDomestic && toShort) return 1500;
            return 3500;
        }
        
        function searchFlights() {
            const from = document.getElementById('fromCity').value;
            const to = document.getElementById('toCity').value;
            const date = document.getElementById('depDate').value;
            
            if (!from || !to || !date) {
                alert('请填写完整的查询条件');
                return;
            }
            
            showLoading(true);
            
            setTimeout(() => {
                const flights = generateFlights(from, to, date);
                displayFlights(flights);
                updateChart(flights);
                showLoading(false);
            }, 1000);
        }
        
        function displayFlights(flights) {
            const container = document.getElementById('flightResults');
            
            if (!flights || flights.length === 0) {
                container.innerHTML = '<div class="empty-state">未找到航班</div>';
                return;
            }
            
            let html = '<div class="flight-list">';
            flights.forEach((flight, index) => {
                html += `
                    <div class="flight-item ${index === 0 ? 'best' : ''}">
                        <div>
                            <div class="flight-airline">${flight.airline} ${flight.flight_no}</div>
                            <div style="font-size: 0.85rem; color: #666;">${flight.dep_airport} → ${flight.arr_airport}</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-weight: 600;">${flight.dep_time_short}</div>
                            <div style="color: #999;">→</div>
                            <div style="font-weight: 600;">${flight.arr_time_short}</div>
                        </div>
                        <div style="text-align: right;">
                            <div class="price-value">¥${flight.price}</div>
                            ${index === 0 ? '<div class="price-tag">最低价</div>' : ''}
                            ${flight.is_mock ? '<div class="price-tag mock">模拟</div>' : ''}
                        </div>
                    </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }
        
        function updateChart(flights) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (window.priceChart) window.priceChart.destroy();
            
            window.priceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: flights.slice(0, 6).map(f => f.airline.substring(0, 4)),
                    datasets: [{
                        label: '价格',
                        data: flights.slice(0, 6).map(f => f.price),
                        backgroundColor: flights.slice(0, 6).map((f, i) => i === 0 ? '#28a745' : '#667eea'),
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { callback: value => '¥' + value }
                        }
                    }
                }
            });
        }
        
        function searchRoundTrip() {
            alert('往返查询功能：查询去程和返程，自动推荐最优组合');
            searchFlights();
        }
        
        function searchMultiDates() {
            alert('多日期比价功能：查询7天内价格，找出最便宜日期');
            searchFlights();
        }
        
        function addWatch() {
            const from = document.getElementById('watchFrom').value;
            const to = document.getElementById('watchTo').value;
            const threshold = document.getElementById('watchThreshold').value;
            
            if (!from || !to || !threshold) {
                alert('请填写完整的监测信息');
                return;
            }
            
            alert(`已添加监测任务：${from}→${to}，阈值¥${threshold}，价格低于此值时将发送邮件提醒`);
        }
    </script>
</body>
</html>
