<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四元投资理论 - 每日监测</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .date-display {
            color: #888;
            font-size: 0.9rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-title {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .phase-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        
        .phase-item {
            text-align: center;
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s;
            opacity: 0.4;
        }
        
        .phase-item.active {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(0,212,255,0.3);
        }
        
        .phase-item.recovery { background: linear-gradient(135deg, #00b894, #00cec9); }
        .phase-item.overheat { background: linear-gradient(135deg, #e17055, #fdcb6e); }
        .phase-item.stagflation { background: linear-gradient(135deg, #d63031, #e84393); }
        .phase-item.recession { background: linear-gradient(135deg, #0984e3, #6c5ce7); }
        
        .phase-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .phase-asset {
            font-size: 0.75rem;
            opacity: 0.9;
        }
        
        .allocation-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .allocation-item {
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .allocation-item:hover {
            transform: translateY(-2px);
        }
        
        .allocation-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .allocation-name {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 4px;
        }
        
        .allocation-percent {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .allocation-slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            outline: none;
        }
        
        .allocation-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(0,212,255,0.5);
        }
        
        .stock { color: #00b894; }
        .bond { color: #0984e3; }
        .commodity { color: #e17055; }
        .cash { color: #fdcb6e; }
        
        .chart-container {
            position: relative;
            height: 250px;
            margin-top: 16px;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #888;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 0.95rem;
        }
        
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,212,255,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            margin-left: 10px;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        
        .history-date {
            color: #888;
        }
        
        .history-phase {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .total-indicator {
            text-align: center;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-top: 16px;
        }
        
        .total-indicator.warning {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }
        
        .total-indicator.ok {
            background: rgba(0, 184, 148, 0.2);
            color: #00b894;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .metric-item {
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00d4ff;
        }
        
        .metric-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }
        
        .confidence-bar {
            display: flex;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        
        .confidence-segment {
            height: 100%;
            transition: width 0.3s;
        }
        
        .confidence-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #888;
            margin-top: 4px;
        }
        
        @media (max-width: 768px) {
            .allocation-grid {
                grid-template-columns: 1fr;
            }
            
            .phase-indicator {
                flex-wrap: wrap;
            }
            
            .phase-item {
                flex: 0 0 50%;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 四元投资理论 - 每日监测</h1>
            <div class="date-display" id="currentDate"></div>
        </header>
        
        <div class="grid">
            <!-- 当前周期阶段 -->
            <div class="card">
                <div class="card-title">🔄 当前经济周期阶段</div>
                <div class="phase-indicator">
                    <div class="phase-item recovery" data-phase="recovery">
                        <div class="phase-name">复苏期</div>
                        <div class="phase-asset">股票最优</div>
                    </div>
                    <div class="phase-item overheat" data-phase="overheat">
                        <div class="phase-name">过热期</div>
                        <div class="phase-asset">商品最优</div>
                    </div>
                    <div class="phase-item stagflation" data-phase="stagflation">
                        <div class="phase-name">滞胀期</div>
                        <div class="phase-asset">现金最优</div>
                    </div>
                    <div class="phase-item recession" data-phase="recession">
                        <div class="phase-name">衰退期</div>
                        <div class="phase-asset">债券最优</div>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>阶段置信度分布</label>
                    <div class="confidence-bar" id="confidenceBar">
                        <div class="confidence-segment" style="width: 25%; background: #00b894;"></div>
                        <div class="confidence-segment" style="width: 25%; background: #e17055;"></div>
                        <div class="confidence-segment" style="width: 25%; background: #d63031;"></div>
                        <div class="confidence-segment" style="width: 25%; background: #0984e3;"></div>
                    </div>
                    <div class="confidence-labels">
                        <span>复苏</span>
                        <span>过热</span>
                        <span>滞胀</span>
                        <span>衰退</span>
                    </div>
                </div>
                
                <div class="input-group" style="margin-top: 16px;">
                    <label>手动选择阶段</label>
                    <select id="phaseSelect">
                        <option value="recovery">复苏期 - 股票最优</option>
                        <option value="overheat">过热期 - 商品最优</option>
                        <option value="stagflation">滞胀期 - 现金最优</option>
                        <option value="recession">衰退期 - 债券最优</option>
                    </select>
                </div>
            </div>
            
            <!-- 资产配置 -->
            <div class="card">
                <div class="card-title">💰 四元资产配置</div>
                <div class="chart-container">
                    <canvas id="allocationChart"></canvas>
                </div>
                <div class="total-indicator" id="totalIndicator">
                    总计: <span id="totalPercent">100</span>%
                </div>
            </div>
            
            <!-- 配置调整 -->
            <div class="card">
                <div class="card-title">⚙️ 调整配置比例</div>
                <div class="allocation-grid">
                    <div class="allocation-item">
                        <div class="allocation-icon">📈</div>
                        <div class="allocation-name">股票</div>
                        <div class="allocation-percent stock" id="stockPercent">60%</div>
                        <input type="range" class="allocation-slider" id="stockSlider" min="0" max="100" value="60">
                    </div>
                    <div class="allocation-item">
                        <div class="allocation-icon">📜</div>
                        <div class="allocation-name">债券</div>
                        <div class="allocation-percent bond" id="bondPercent">20%</div>
                        <input type="range" class="allocation-slider" id="bondSlider" min="0" max="100" value="20">
                    </div>
                    <div class="allocation-item">
                        <div class="allocation-icon">🛢️</div>
                        <div class="allocation-name">大宗商品</div>
                        <div class="allocation-percent commodity" id="commodityPercent">15%</div>
                        <input type="range" class="allocation-slider" id="commoditySlider" min="0" max="100" value="15">
                    </div>
                    <div class="allocation-item">
                        <div class="allocation-icon">💵</div>
                        <div class="allocation-name">现金</div>
                        <div class="allocation-percent cash" id="cashPercent">5%</div>
                        <input type="range" class="allocation-slider" id="cashSlider" min="0" max="100" value="5">
                    </div>
                </div>
                <div style="margin-top: 16px; text-align: center;">
                    <button class="btn btn-primary" onclick="saveAllocation()">保存配置</button>
                    <button class="btn btn-secondary" onclick="resetAllocation()">重置</button>
                </div>
            </div>
            
            <!-- 关键指标 -->
            <div class="card">
                <div class="card-title">📈 关键监测指标</div>
                <div class="metrics-grid">
                    <div class="metric-item">
                        <div class="metric-value" id="pmiValue">50.2</div>
                        <div class="metric-label">PMI</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value" id="cpiValue">2.1%</div>
                        <div class="metric-label">CPI同比</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value" id="yieldValue">2.35%</div>
                        <div class="metric-label">10年国债</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value" id="vixValue">18.5</div>
                        <div class="metric-label">VIX波动率</div>
                    </div>
                </div>
                <div style="margin-top: 16px; text-align: center;">
                    <button class="btn btn-primary" onclick="updateMetrics()">更新指标</button>
                </div>
            </div>
            
            <!-- 调仓历史 -->
            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-title">📋 调仓历史记录</div>
                <div class="history-list" id="historyList">
                    <!-- 历史记录将在这里动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 默认配置
        const defaultAllocations = {
            recovery: { stock: 60, bond: 25, commodity: 10, cash: 5 },
            overheat: { stock: 20, bond: 15, commodity: 55, cash: 10 },
            stagflation: { stock: 15, bond: 30, commodity: 15, cash: 40 },
            recession: { stock: 10, bond: 55, commodity: 5, cash: 30 }
        };
        
        // 当前配置
        let currentAllocation = { ...defaultAllocations.recovery };
        let currentPhase = 'recovery';
        let allocationChart = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateDate();
            initChart();
            loadHistory();
            updatePhaseDisplay();
            
            // 绑定滑块事件
            ['stock', 'bond', 'commodity', 'cash'].forEach(type => {
                const slider = document.getElementById(type + 'Slider');
                slider.addEventListener('input', function() {
                    updateAllocation(type, this.value);
                });
            });
            
            // 绑定阶段选择
            document.getElementById('phaseSelect').addEventListener('change', function() {
                setPhase(this.value);
            });
            
            // 绑定阶段点击
            document.querySelectorAll('.phase-item').forEach(item => {
                item.addEventListener('click', function() {
                    setPhase(this.dataset.phase);
                });
            });
        });
        
        // 更新日期显示
        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', options);
        }
        
        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('allocationChart').getContext('2d');
            allocationChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['股票', '债券', '大宗商品', '现金'],
                    datasets: [{
                        data: [60, 25, 10, 5],
                        backgroundColor: ['#00b894', '#0984e3', '#e17055', '#fdcb6e'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#fff',
                                padding: 20,
                                font: { size: 12 }
                            }
                        }
                    },
                    cutout: '60%'
                }
            });
        }
        
        // 更新配置
        function updateAllocation(type, value) {
            currentAllocation[type] = parseInt(value);
            document.getElementById(type + 'Percent').textContent = value + '%';
            updateChart();
            updateTotal();
        }
        
        // 更新图表
        function updateChart() {
            allocationChart.data.datasets[0].data = [
                currentAllocation.stock,
                currentAllocation.bond,
                currentAllocation.commodity,
                currentAllocation.cash
            ];
            allocationChart.update();
        }
        
        // 更新总计
        function updateTotal() {
            const total = Object.values(currentAllocation).reduce((a, b) => a + b, 0);
            const indicator = document.getElementById('totalIndicator');
            const totalSpan = document.getElementById('totalPercent');
            
            totalSpan.textContent = total;
            
            if (total === 100) {
                indicator.className = 'total-indicator ok';
            } else {
                indicator.className = 'total-indicator warning';
            }
        }
        
        // 设置阶段
        function setPhase(phase) {
            currentPhase = phase;
            document.getElementById('phaseSelect').value = phase;
            
            // 更新配置为阶段默认
            currentAllocation = { ...defaultAllocations[phase] };
            
            // 更新滑块和显示
            Object.keys(currentAllocation).forEach(type => {
                const value = currentAllocation[type];
                document.getElementById(type + 'Slider').value = value;
                document.getElementById(type + 'Percent').textContent = value + '%';
            });
            
            updateChart();
            updateTotal();
            updatePhaseDisplay();
        }
        
        // 更新阶段显示
        function updatePhaseDisplay() {
            document.querySelectorAll('.phase-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.phase === currentPhase) {
                    item.classList.add('active');
                }
            });
        }
        
        // 保存配置
        function saveAllocation() {
            const total = Object.values(currentAllocation).reduce((a, b) => a + b, 0);
            if (total !== 100) {
                alert('配置比例总计必须等于100%，当前为' + total + '%');
                return;
            }
            
            const record = {
                date: new Date().toISOString(),
                phase: currentPhase,
                allocation: { ...currentAllocation },
                metrics: {
                    pmi: document.getElementById('pmiValue').textContent,
                    cpi: document.getElementById('cpiValue').textContent,
                    yield: document.getElementById('yieldValue').textContent,
                    vix: document.getElementById('vixValue').textContent
                }
            };
            
            // 保存到本地存储
            let history = JSON.parse(localStorage.getItem('allocationHistory') || '[]');
            history.unshift(record);
            localStorage.setItem('allocationHistory', JSON.stringify(history));
            
            loadHistory();
            alert('配置已保存！');
        }
        
        // 重置配置
        function resetAllocation() {
            setPhase(currentPhase);
        }
        
        // 加载历史
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('allocationHistory') || '[]');
            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">暂无历史记录</div>';
                return;
            }
            
            list.innerHTML = history.slice(0, 20).map(record => {
                const date = new Date(record.date);
                const dateStr = date.toLocaleDateString('zh-CN');
                const phaseNames = {
                    recovery: '复苏期',
                    overheat: '过热期',
                    stagflation: '滞胀期',
                    recession: '衰退期'
                };
                const phaseColors = {
                    recovery: '#00b894',
                    overheat: '#e17055',
                    stagflation: '#d63031',
                    recession: '#0984e3'
                };
                
                return `
                    <div class="history-item">
                        <div>
                            <span class="history-date">${dateStr}</span>
                            <span class="history-phase" style="background: ${phaseColors[record.phase]}20; color: ${phaseColors[record.phase]};">
                                ${phaseNames[record.phase]}
                            </span>
                        </div>
                        <div style="color: #888;">
                            股${record.allocation.stock}% 债${record.allocation.bond}% 商${record.allocation.commodity}% 现${record.allocation.cash}%
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 更新指标（模拟）
        function updateMetrics() {
            // 这里可以接入真实数据源
            const pmi = (49 + Math.random() * 4).toFixed(1);
            const cpi = (1.5 + Math.random() * 2).toFixed(1);
            const yield = (2.2 + Math.random() * 0.5).toFixed(2);
            const vix = (15 + Math.random() * 15).toFixed(1);
            
            document.getElementById('pmiValue').textContent = pmi;
            document.getElementById('cpiValue').textContent = cpi + '%';
            document.getElementById('yieldValue').textContent = yield + '%';
            document.getElementById('vixValue').textContent = vix;
            
            // 根据指标自动判断阶段
            autoDetectPhase(parseFloat(pmi), parseFloat(cpi));
        }
        
        // 自动检测阶段（简化版）
        function autoDetectPhase(pmi, cpi) {
            let phase = 'recovery';
            let confidence = { recovery: 0, overheat: 0, stagflation: 0, recession: 0 };
            
            if (pmi > 50 && cpi < 2.5) {
                phase = 'recovery';
                confidence = { recovery: 0.7, overheat: 0.2, stagflation: 0.05, recession: 0.05 };
            } else if (pmi > 50 && cpi >= 2.5) {
                phase = 'overheat';
                confidence = { recovery: 0.15, overheat: 0.75, stagflation: 0.08, recession: 0.02 };
            } else if (pmi <= 50 && cpi >= 2.5) {
                phase = 'stagflation';
                confidence = { recovery: 0.05, overheat: 0.2, stagflation: 0.7, recession: 0.05 };
            } else {
                phase = 'recession';
                confidence = { recovery: 0.1, overheat: 0.05, stagflation: 0.15, recession: 0.7 };
            }
            
            // 更新置信度条
            const total = Object.values(confidence).reduce((a, b) => a + b, 0);
            const bar = document.getElementById('confidenceBar');
            bar.innerHTML = `
                <div class="confidence-segment" style="width: ${confidence.recovery/total*100}%; background: #00b894;"></div>
                <div class="confidence-segment" style="width: ${confidence.overheat/total*100}%; background: #e17055;"></div>
                <div class="confidence-segment" style="width: ${confidence.stagflation/total*100}%; background: #d63031;"></div>
                <div class="confidence-segment" style="width: ${confidence.recession/total*100}%; background: #0984e3;"></div>
            `;
            
            // 如果置信度足够高，建议切换
            if (confidence[phase] > 0.6 && phase !== currentPhase) {
                if (confirm(`指标显示当前可能处于${phase === 'recovery' ? '复苏期' : phase === 'overheat' ? '过热期' : phase === 'stagflation' ? '滞胀期' : '衰退期'}，是否切换？`)) {
                    setPhase(phase);
                }
            }
